<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Defensive patch to prevent "Cannot set property fetch which has only a getter" errors
      // occurring in certain iframe/sandboxed environments.
      (function() {
        function patch(name) {
          try {
            const descriptor = Object.getOwnPropertyDescriptor(window, name);
            if (descriptor && (!descriptor.writable || !descriptor.set) && descriptor.configurable) {
              const originalValue = window[name];
              Object.defineProperty(window, name, {
                get: function() { return originalValue; },
                set: function(v) { 
                  console.warn('Polyfill attempt on persistent window.' + name + ' ignored.'); 
                  return true;
                },
                enumerable: true,
                configurable: true
              });
            }
          } catch (e) {}
        }
        ['fetch', 'Headers', 'Request', 'Response', 'ReadableStream'].forEach(patch);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
